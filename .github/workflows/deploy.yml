name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate PHP syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PHP CLI
        run: |
          set -euo pipefail
          php -v

      - name: Lint PHP files
        run: |
          set -euo pipefail
          find . -type f -name '*.php' -not -path './.git/*' -print0 \
            | xargs -0 -n1 php -l

  deploy:
    name: Deploy to production
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY VPS_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: SSH deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 8m
          script: |
            set -euo pipefail

            RELEASE_DIR="${{ secrets.VPS_PATH }}"
            BACKUP_DIR="/var/backups/elsesserandco"
            REMOTE_USER="${{ secrets.VPS_USER }}"
            STAMP=$(date +%F-%H%M%S)

            echo "==> [1/6] cd ${RELEASE_DIR}"
            cd "${RELEASE_DIR}"

            echo "==> [2/6] DB backup → ${BACKUP_DIR}/db-${STAMP}.sql.gz"
            sudo mkdir -p "${BACKUP_DIR}"
            sudo chown "$(whoami)":"$(whoami)" "${BACKUP_DIR}"
            # Достаём креды БД из .env (REALESTATE_DB_* — как в includes/config/database.php)
            if [ ! -f .env ]; then
              echo "ERROR: .env is missing on VPS at ${RELEASE_DIR}" >&2
              exit 1
            fi
            set -a
            # shellcheck disable=SC1091
            . ./.env
            set +a
            : "${REALESTATE_DB_USER:?REALESTATE_DB_USER is required in .env}"
            : "${REALESTATE_DB_PASS:?REALESTATE_DB_PASS is required in .env}"
            mysqldump \
              --single-transaction --quick --routines --triggers \
              -h "${REALESTATE_DB_HOST:-localhost}" \
              -u "${REALESTATE_DB_USER}" \
              -p"${REALESTATE_DB_PASS}" \
              "${REALESTATE_DB_NAME:-realestate_db}" \
              | gzip > "${BACKUP_DIR}/db-${STAMP}.sql.gz"
            # Чистим бэкапы старше 14 дней
            find "${BACKUP_DIR}" -name 'db-*.sql.gz' -mtime +14 -delete

            echo "==> [3/6] git pull (preserve .env / logs / uploads / cache)"
            # Fix git "dubious ownership" and permissions when deploy user != repo owner.
            # Take ownership of .git (sudoers allow deploy -> chown deploy:www-data).
            sudo chown -R "${REMOTE_USER}":www-data "${RELEASE_DIR}/.git"
            git config --global --add safe.directory "${RELEASE_DIR}"
            git config --global --add safe.directory '*'
            git fetch --all --prune
            git reset --hard origin/main
            git clean -fd \
              -e .env -e .env.local \
              -e logs/ -e cache/ -e session/ -e uploads/ \
              -e images/uploads/ \
              -e includes/auth/check_auth.php \
              -e includes/config/local.php

            echo "==> [4/6] Applying SQL migrations"
            php database/migrate.php

            echo "==> [5/6] Fixing permissions"
            sudo chown -R "${REMOTE_USER}":www-data "${RELEASE_DIR}"
            find . -type d -not -path './.git*' -exec chmod 775 {} \;
            find . -type f -not -path './.git*' -exec chmod 664 {} \;
            chmod 640 .env || true
            sudo chgrp www-data .env || true
            # Папки на запись веб-серверу
            for dir in logs cache session uploads images/uploads; do
              if [ -d "$dir" ]; then
                sudo chmod -R 775 "${RELEASE_DIR}/${dir}"
              fi
            done

            echo "==> [6/6] Reloading services"
            # Reload both FPM pools (elsesserandco runs on 8.1, clickandeat on 8.3 on the same VPS).
            if systemctl is-active --quiet php8.1-fpm; then
              sudo systemctl reload php8.1-fpm
              echo "    php8.1-fpm reloaded"
            fi
            if systemctl is-active --quiet php8.3-fpm; then
              sudo systemctl reload php8.3-fpm
              echo "    php8.3-fpm reloaded"
            fi
            sudo systemctl reload apache2
            echo "    apache2 reloaded"

            echo ""
            echo "==> Deploy OK. HEAD = $(git rev-parse --short HEAD)"
            echo "==> Backup: ${BACKUP_DIR}/db-${STAMP}.sql.gz"

      - name: Smoke test
        env:
          SMOKE_URL: ${{ secrets.SMOKE_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          TARGET="${SMOKE_URL:-$VPS_HOST}"
          TARGET="${TARGET#http://}"
          TARGET="${TARGET#https://}"
          HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "https://${TARGET}/" || echo "000")
          echo "Homepage HTTP: $HTTP"
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "301" ] && [ "$HTTP" != "302" ]; then
            echo "::error::Smoke test returned $HTTP (expected 200/301/302)"
            exit 1
          fi
